<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A continuous audio-visual journey across Iceland by Ginebra Raventós, Emilio Marx, Edgardo Gómez and Joan Lavandeira">
  <title>Iceland Radio Installation</title>
  
  <!-- Google Fonts - Barlow Condensed -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <!-- Leaflet CSS for OpenStreetMap -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <!-- Cesium for 3D terrain (completely free, no token required) -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.109/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.109/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Barlow Condensed', 'Helvetica Neue', Helvetica, sans-serif;
      color: #fff;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    
    /* Main layout */
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    
    /* Media display (left side, not full screen) */
    #media-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    
    /* BARRAS VERTICALES NEGRAS */
    #black-bars-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 120px;
      z-index: 5;
      display: flex;
      pointer-events: none;
    }
    
    .black-bar {
      width: 25%;
      height: 100%;
      background: #000;
      opacity: 0.95;
      backdrop-filter: blur(150px);
      -webkit-backdrop-filter: blur(150px);
      transition: opacity 1.2s ease-in-out, backdrop-filter 1.4s ease-in-out;
    }
    
    .black-bar.transparent {
      opacity: 0 !important;
      backdrop-filter: blur(0px) !important;
      -webkit-backdrop-filter: blur(0px) !important;
      background: transparent !important;
    }
    
    /* Right sidebar - dark volcanic grey with opacity */
    #right-sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: 25%;
      bottom: 120px;
      background: black;
      z-index: 2;
      display: flex;
      flex-direction: column;
    }
    
    /* Map takes half of sidebar */
    #map-container {
      width: 100%;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    
    /* Leaflet map fills container */
    #map-container .leaflet-container {
      width: 100%;
      height: 100%;
    }
    
    /* UI container (for overlays) */
    #ui-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 100;
      pointer-events: none;
    }
    
    #ui-container > * {
      pointer-events: auto;
    }
    
    /* Responsive adjustments */
    @media (max-width: 1024px) {
      #right-sidebar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        width: 100%;
        height: 120px;
        bottom: auto;
        flex-direction: row;
        border-left: none;
      }
      
      #map-container {
        flex: 1;
        min-height: 0;
      }
      
      #media-container {
        right: 0;
        top: 120px;
        bottom: 100px;
      }
      
      #black-bars-container {
        bottom: 100px;
        top: 120px;
      }
      
      #info-overlay {
        height: 100px;
        padding: 0.8rem 1.2rem;
        gap: 1.2rem;
      }
      
      .bar-module-label {
        font-size: 0.45rem !important;
        letter-spacing: 1.5px !important;
      }
      
      #frequency-bars-wrapper {
        display: none;
      }
      
      #elevation-profile-container {
        min-width: 100px;
        max-width: 160px;
      }
      
      .volume-slider-container {
        height: 50px !important;
      }
      
      .volume-slider {
        height: 50px !important;
      }
      
      .now-playing-section {
        font-size: 0.5rem !important;
      }
      
      .now-playing-track {
        font-size: 0.7rem !important;
      }
    }
    
    @media (max-width: 580px) {
      #right-sidebar {
        height: 100px;
      }
      
      #media-container {
        top: 100px;
        bottom: 80px;
      }
      
      #black-bars-container {
        bottom: 80px;
        top: 100px;
      }
      
      #info-overlay {
        height: 80px;
        padding: 0.5rem 0.8rem;
        gap: 0.8rem;
      }
      
      #elevation-profile-container {
        display: none;
      }
      
      .volume-slider-container {
        height: 35px !important;
      }
      
      .volume-slider {
        height: 35px !important;
      }
    }
    
    /* =============================================
       BOTTOM BAR — Unified module design
       ============================================= */
    
    #info-overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      z-index: 10;
      background: #0c0e10;
      padding: 1rem 2rem;
      display: flex;
      align-items: stretch;
      gap: 2rem;
      box-sizing: border-box;
    }
    
    /* --- Module pattern: content above, label below --- */
    .bar-module {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
    }
    
    .bar-module-content {
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      min-height: 0;
    }
    
    .bar-module-label {
      font-size: 0.6rem;
      color: #586462;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-family: 'Barlow Condensed', 'Helvetica Neue', Helvetica, sans-serif;
      font-weight: 400;
      white-space: nowrap;
    }
    
    /* --- VOLUME --- */
    #volume-module {
      min-width: 28px;
    }
    
    .volume-slider-container {
      height: 60px;
      width: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .volume-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 3px;
      height: 60px;
      background: rgba(116, 121, 120, 0.3);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      writing-mode: vertical-lr;
      direction: rtl;
    }
    
    .volume-slider::-webkit-slider-runnable-track {
      background: rgba(50, 53, 53, 0.4);
      border-radius: 2px;
    }
    
    .volume-slider::-moz-range-track {
      background: rgba(50, 53, 53, 0.4);
      border-radius: 2px;
    }
    
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 6px rgba(168, 181, 178, 0.4);
      border: none;
    }
    
    .volume-slider::-moz-range-thumb {
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 6px rgba(168, 181, 178, 0.4);
    }
    
    .volume-slider::-moz-range-progress {
      background: rgba(168, 181, 178, 0.4);
      border-radius: 2px;
    }
    
    /* --- SPECTRUM --- */
    #frequency-bars-wrapper {
      min-width: 55px;
    }
    
    #frequency-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 100%;
    }
    
    .frequency-bar {
      width: 2px;
      background: linear-gradient(to top, #586462, #a8b5b2);
      border-radius: 1px 1px 0 0;
      transition: height 0.1s ease;
    }
    
    /* --- NOW PLAYING --- */
    #now-playing-module {
      flex: 1;
      min-width: 0;
      align-items: flex-start;
    }
    
    #now-playing-module .bar-module-content {
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-end;
      gap: 3px;
      width: 100%;
    }
    
    .now-playing-section {
      font-size: 0.6rem;
      color: #747978;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-family: 'Barlow Condensed', 'Helvetica Neue', Helvetica, sans-serif;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    
    .now-playing-track {
      font-size: 0.85rem;
      color: #a8b5b2;
      font-family: 'Barlow Condensed', 'Helvetica Neue', Helvetica, sans-serif;
      font-weight: 300;
      letter-spacing: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    
    /* --- ELEVATION --- */
    #elevation-profile-container {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-end;
      min-width: 150px;
      max-width: 280px;
      width: 22%;
      gap: 6px;
    }
    
    #elevation-profile {
      width: 100%;
      flex: 1;
      min-height: 0;
      opacity: 0.85;
    }
    
    #elevation-section-label {
      font-size: 0.6rem;
      color: #586462;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-family: 'Barlow Condensed', 'Helvetica Neue', Helvetica, sans-serif;
      font-weight: 400;
      text-align: right;
      width: 100%;
    }
    
    /* Loading states */
    .loading {
      opacity: 0.5;
      pointer-events: none;
    }
    
    /* Accessibility */
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Media display (videos/images) - Left rectangle -->
    <div id="media-container" role="img" aria-label="Visual content from Iceland journey"></div>
    
    <!-- BARRAS NEGRAS VERTICALES -->
    <div id="black-bars-container">
      <div class="black-bar" data-bar="0"></div>
      <div class="black-bar" data-bar="1"></div>
      <div class="black-bar" data-bar="2"></div>
      <div class="black-bar" data-bar="3"></div>
    </div>
    
    <!-- Right sidebar - Map and Cameras -->
    <div id="right-sidebar">
      <!-- Map at top -->
      <div id="map-container" role="img" aria-label="Route map of Iceland journey"></div>
    </div>
    
    <!-- Now Playing Bar - Bottom -->
    <div id="info-overlay">
      <!-- Volume -->
      <div class="bar-module" id="volume-module">
        <div class="bar-module-content">
          <div class="volume-slider-container">
            <input type="range" id="volume-slider" class="volume-slider" min="0" max="100" value="100" orient="vertical">
          </div>
        </div>
        <div class="bar-module-label">vol</div>
      </div>
      
      <!-- Spectrum -->
      <div class="bar-module" id="frequency-bars-wrapper">
        <div class="bar-module-content">
          <div id="frequency-bars">
            <div class="frequency-bar" style="height: 20px;"></div>
            <div class="frequency-bar" style="height: 30px;"></div>
            <div class="frequency-bar" style="height: 15px;"></div>
            <div class="frequency-bar" style="height: 35px;"></div>
            <div class="frequency-bar" style="height: 25px;"></div>
            <div class="frequency-bar" style="height: 40px;"></div>
            <div class="frequency-bar" style="height: 18px;"></div>
            <div class="frequency-bar" style="height: 32px;"></div>
            <div class="frequency-bar" style="height: 22px;"></div>
            <div class="frequency-bar" style="height: 28px;"></div>
            <div class="frequency-bar" style="height: 16px;"></div>
            <div class="frequency-bar" style="height: 36px;"></div>
            <div class="frequency-bar" style="height: 24px;"></div>
            <div class="frequency-bar" style="height: 33px;"></div>
            <div class="frequency-bar" style="height: 19px;"></div>
          </div>
        </div>
        <div class="bar-module-label">spectrum</div>
      </div>
      
      <!-- Now Playing -->
      <div class="bar-module" id="now-playing-module">
        <div class="bar-module-content">
          <span class="now-playing-section" id="current-section">Iceland Sound Route</span>
          <span class="now-playing-track" id="current-track">Loading...</span>
        </div>
        <div class="bar-module-label">now playing</div>
      </div>
      
      <!-- Elevation -->
      <div id="elevation-profile-container">
        <canvas id="elevation-profile"></canvas>
        <div id="elevation-section-label">elevation</div>
      </div>
    </div>
    
    <!-- UI overlays (tune-in button, loading, errors) -->
    <div id="ui-container"></div>
  </div>
  
  <!-- Leaflet JS for OpenStreetMap -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <!-- Script de animación de barras -->
  <script>
    // Función para animar las barras negras con blur y opacidad variable
    function animateBlackBars() {
      const bars = document.querySelectorAll('.black-bar');
      
      function toggleRandomBar() {
        // Seleccionar una barra aleatoria (0-3)
        const randomBarIndex = Math.floor(Math.random() * 4);
        const randomBar = bars[randomBarIndex];
        
        // Si la barra está transparente, la hacemos NEGRA con opacidad y blur aleatorios
        if (randomBar.classList.contains('transparent')) {
          randomBar.classList.remove('transparent');
          
          // Opacidad aleatoria entre 0.9 y 1.0 (mucho más negras)
          const randomOpacity = Math.random() * 0.1 + 0.9; // 0.9 a 1.0
          randomBar.style.opacity = randomOpacity;
          
          // Blur aleatorio entre 20px y 40px (efecto mancha, muy borroso)
          const randomBlur = Math.floor(Math.random() * 21) + 20; // 20px a 40px
          randomBar.style.backdropFilter = `blur(${randomBlur}px)`;
          randomBar.style.webkitBackdropFilter = `blur(${randomBlur}px)`;
        } else {
          // Si la barra está NEGRA, la hacemos completamente TRANSPARENTE (sin blur, sin opacidad)
          randomBar.classList.add('transparent');
        }
        
        // Programar siguiente cambio en tiempo aleatorio más rápido (0.3-1.5 segundos)
        const randomDelay = (Math.random() * 1.2 + 0.3) * 1000; // 300ms a 1500ms
        setTimeout(toggleRandomBar, randomDelay);
      }
      
      // Inicializar barras con valores aleatorios al inicio (todas empiezan NEGRAS)
      bars.forEach(bar => {
        const initialOpacity = Math.random() * 0.1 + 0.9;
        const initialBlur = Math.floor(Math.random() * 21) + 20;
        bar.style.opacity = initialOpacity;
        bar.style.backdropFilter = `blur(${initialBlur}px)`;
        bar.style.webkitBackdropFilter = `blur(${initialBlur}px)`;
      });
      
      // Iniciar la animación
      toggleRandomBar();
    }
    
    // Iniciar cuando el DOM esté listo
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', animateBlackBars);
    } else {
      animateBlackBars();
    }
  </script>
  
  <!-- Main application script (ES6 modules) -->
  <script type="module" src="./src/main.js"></script>
  
  <!-- Screen reader announcements -->
  <div class="visually-hidden" role="status" aria-live="polite" aria-atomic="true" id="sr-announcements"></div>
</body>
</html>
